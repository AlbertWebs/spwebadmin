<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#172455" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Stagepass Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div id="preloader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;background:#f8fafc;font-family:system-ui,sans-serif;">
        <div style="width:4rem;height:4rem;border-radius:1rem;background:#ca8a04;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;font-weight:700;box-shadow:0 4px 14px rgba(202,138,4,0.35);">S</div>
        <div style="text-align:center;">
          <p style="font-size:1.125rem;font-weight:600;color:#1e293b;">Stagepass</p>
          <p style="font-size:0.875rem;color:#64748b;margin-top:0.25rem;">Loading…</p>
        </div>
        <div style="display:flex;gap:0.375rem;">
          <span style="width:0.5rem;height:0.5rem;border-radius:9999px;background:#ca8a04;opacity:0.6;animation:preloader-dot 1.4s ease-in-out 0s infinite both;"></span>
          <span style="width:0.5rem;height:0.5rem;border-radius:9999px;background:#ca8a04;opacity:0.6;animation:preloader-dot 1.4s ease-in-out 0.2s infinite both;"></span>
          <span style="width:0.5rem;height:0.5rem;border-radius:9999px;background:#ca8a04;opacity:0.6;animation:preloader-dot 1.4s ease-in-out 0.4s infinite both;"></span>
        </div>
      </div>
    </div>
    <style>
      @keyframes preloader-dot {
        0%,80%,100%{transform:scale(0.6);opacity:0.5}
        40%{transform:scale(1);opacity:1}
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
